<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Materia — Aula IFN</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<style>
:root{--bg:#05060a;--panel:#0b0f1a;--panel2:#10141f;--linea:rgba(0,240,255,.14);--linea2:rgba(0,240,255,.3);--tx:#e9f6ff;--tx2:#8aa0b8;--tx3:#52647a;--neon:#00f0ff;--ok:#00ffa3;--err:#ff4d6d;--oro:#ffd23f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:var(--tx);background:var(--bg);min-height:100vh;}
h1,h2,h3{font-family:'Chakra Petch',sans-serif;}
body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 20% 0%,rgba(0,240,255,.1),transparent 38%),radial-gradient(circle at 90% 12%,rgba(255,45,155,.08),transparent 40%);pointer-events:none;}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 20px 60px;}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.br{display:flex;align-items:center;gap:12px;}
.br img{height:42px;width:42px;object-fit:contain;border-radius:9px;background:#fff;padding:3px;}
.br b{font-family:'Chakra Petch';font-weight:700;font-size:14px;color:#fff;display:block;line-height:1.1;}
.br span{font-size:10px;color:var(--neon);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.back{font-size:13px;color:var(--tx2);text-decoration:none;padding:8px 14px;border:1px solid var(--linea2);border-radius:7px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.back:hover{color:var(--neon);}
.hide{display:none!important;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--linea2);border-top-color:var(--neon);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg);}}

/* HERO de materia */
.mhero{background:var(--panel);border:1px solid var(--linea2);border-radius:16px;padding:28px 26px;margin-bottom:24px;position:relative;overflow:hidden;}
.mhero::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--neon);box-shadow:0 0 12px var(--neon);}
.mhero-inner{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.mic{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;}
.minfo{flex:1;min-width:200px;}
.minfo h1{font-size:26px;color:#fff;margin-bottom:4px;}
.minfo .msub{font-size:13px;color:var(--tx2);}
.minfo .gbadge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-family:'Chakra Petch';font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;letter-spacing:.5px;}

/* Quién es */
.who{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--panel2);border:1px solid var(--linea);border-radius:10px;margin-bottom:24px;}
.wh-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--neon),#0088aa);display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch';font-weight:700;color:var(--bg);font-size:16px;flex-shrink:0;}
.wh-av.demo{background:linear-gradient(135deg,var(--oro),#a06000);}
.who b{font-family:'Chakra Petch';color:#fff;font-size:14px;display:block;line-height:1.2;}
.who span{font-size:12px;color:var(--tx2);}
.who a{margin-left:auto;font-size:12px;color:var(--tx3);cursor:pointer;text-decoration:none;}
.who a:hover{color:var(--neon);}

/* Sección */
.sec{margin-bottom:28px;}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sec-hdr h2{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--tx2);}
.sec-hdr .sline{flex:1;height:1px;background:var(--linea);}

/* Tarjetas de material */
.mat-card{background:var(--panel2);border:1px solid var(--linea);border-radius:12px;padding:18px 20px;display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;transition:.15s;}
.mat-card:hover{border-color:var(--linea2);}
.mat-ico{width:42px;height:42px;border-radius:10px;background:rgba(255,210,63,.1);color:var(--oro);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.mat-body{flex:1;min-width:0;}
.mat-body b{font-family:'Chakra Petch';font-size:14px;color:#fff;display:block;margin-bottom:3px;}
.mat-body p{font-size:13px;color:var(--tx2);margin-bottom:8px;}
.mat-fecha{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'Chakra Petch';padding:3px 9px;border-radius:100px;background:rgba(0,240,255,.08);color:var(--neon);border:1px solid var(--linea2);}
.mat-dl{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;font-family:'Chakra Petch';font-weight:600;color:var(--neon);text-decoration:none;padding:7px 14px;border:1px solid var(--linea2);border-radius:7px;transition:.15s;}
.mat-dl:hover{background:rgba(0,240,255,.08);border-color:var(--neon);}

/* Countdown reloj */
.cd-box{margin-top:12px;background:rgba(255,77,109,.06);border:1px solid rgba(255,77,109,.3);border-radius:10px;padding:12px 14px;}
.cd-box.urgente{background:rgba(255,77,109,.1);border-color:rgba(255,77,109,.45);animation:cdpulse 2s infinite;}
@keyframes cdpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,.25);}50%{box-shadow:0 0 0 6px rgba(255,77,109,0);}}
.cd-label{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'Chakra Petch';font-weight:600;color:var(--err);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.cd-clock{display:flex;gap:8px;}
.cd-unit{flex:1;text-align:center;background:var(--bg);border:1px solid rgba(255,77,109,.35);border-radius:8px;padding:8px 4px;}
.cd-unit b{display:block;font-family:'Chakra Petch';font-size:20px;font-weight:700;color:var(--err);line-height:1;}
.cd-unit span{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;}
.cd-finalizado{font-size:12px;color:var(--tx2);font-style:italic;}

/* Tarjetas de actividad */
.act-card{background:var(--panel2);border:1px solid var(--linea);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:14px;margin-bottom:12px;text-decoration:none;color:inherit;transition:.15s;cursor:pointer;}
.act-card:hover{border-color:var(--linea2);transform:translateY(-1px);}
.act-card.bloqueada{opacity:.5;cursor:not-allowed;pointer-events:none;}
.ac-ico{width:48px;height:48px;border-radius:12px;background:rgba(0,240,255,.08);color:var(--neon);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.ac-body{flex:1;min-width:0;}
.ac-body b{font-family:'Chakra Petch';font-size:15px;color:#fff;display:block;margin-bottom:2px;}
.ac-body span{font-size:12px;color:var(--tx2);}
.ac-nota{font-family:'Chakra Petch';font-size:13px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.ac-nota.ap{background:rgba(0,255,163,.12);color:var(--ok);}
.ac-nota.re{background:rgba(255,77,109,.12);color:var(--err);}
.ac-nota.pend{background:var(--bg);color:var(--tx3);border:1px solid var(--linea);}
.ac-est{display:flex;align-items:center;gap:6px;font-family:'Chakra Petch';font-size:10px;padding:3px 8px;border-radius:100px;white-space:nowrap;}
.ac-est.abierta{background:rgba(0,255,163,.1);color:var(--ok);}
.ac-est.cerrada{background:rgba(255,77,109,.1);color:var(--err);}
.ago{color:var(--tx3);font-size:20px;margin-left:4px;}

.empty{text-align:center;padding:28px;color:var(--tx3);font-size:13px;background:var(--panel2);border:1px dashed var(--linea);border-radius:12px;}
.loading{text-align:center;padding:28px;color:var(--tx2);font-size:13px;}
.trimtabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.trim-tab{font-family:'Chakra Petch';font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--linea2);background:var(--panel2);color:var(--tx2);cursor:pointer;transition:.15s;}
.trim-tab.on{background:var(--neon);color:var(--bg);border-color:var(--neon);}
.trim-tab:not(.on):hover{color:var(--neon);}
@media(max-width:560px){
  .mhero{padding:20px 18px;}
  .mhero h1{font-size:21px;}
  .mic{width:52px;height:52px;font-size:26px;}
  .who{flex-wrap:wrap;}
  .who a{margin-left:0;width:100%;text-align:right;}
  .trim-tab{flex:1;text-align:center;padding:8px 6px;font-size:11px;}
  .act-card{flex-wrap:wrap;}
  .ac-est,.ac-nota{margin-left:0;}
  .ago{display:none;}
  .mat-card{padding:14px 16px;}
  .cd-clock{gap:6px;}
  .cd-unit{padding:6px 2px;}
  .cd-unit b{font-size:17px;}
}
@media(min-width:1300px){
  .wrap{max-width:1000px;}
}
</style>
</head><body><div class="wrap">

<div class="top">
  <div class="br"><img src="logo.png"><div><b>Instituto Fermín Naudeau</b><span>Aula Virtual</span></div></div>
  <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> Volver</a>
</div>

<!-- HERO -->
<div class="mhero">
  <div class="mhero-inner">
    <div class="mic" id="mIco"></div>
    <div class="minfo">
      <h1 id="mNom">Cargando…</h1>
      <p class="msub" id="mSub"></p>
      <span class="gbadge" id="mGrados"></span>
    </div>
  </div>
</div>

<!-- QUIÉN ERES -->
<div class="who" id="whoBox">
  <div class="wh-av" id="whAv">?</div>
  <div><b id="whNom">—</b><span id="whGrado">—</span></div>
  <a href="index.html">Cambiar cuenta</a>
</div>

<!-- TRIMESTRES -->
<div class="trimtabs" id="trimTabs">
  <button class="trim-tab" id="ttrim1" onclick="setTrim(1,this)">Trimestre 1</button>
  <button class="trim-tab" id="ttrim2" onclick="setTrim(2,this)">Trimestre 2</button>
  <button class="trim-tab" id="ttrim3" onclick="setTrim(3,this)">Trimestre 3</button>
</div>

<!-- MATERIALES -->
<div class="sec" id="secMat">
  <div class="sec-hdr"><h2><i class="ti ti-paperclip"></i> Materiales y recursos</h2><div class="sline"></div></div>
  <div id="listaMat"><div class="loading"><span class="spin"></span> Cargando materiales…</div></div>
</div>

<!-- ACTIVIDADES -->
<div class="sec" id="secAct">
  <div class="sec-hdr"><h2><i class="ti ti-device-gamepad-2"></i> Actividades</h2><div class="sline"></div></div>
  <div id="listaAct"><div class="loading"><span class="spin"></span> Cargando actividades…</div></div>
</div>

</div>

<script src="config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

// --- Paletas por materia ---
const PALETA = {
  comercio:   { color:'var(--ok)',  bg:'rgba(0,255,163,.1)',  icon:'ti-briefcase' },
  tecnologia: { color:'var(--neon)',bg:'rgba(0,240,255,.1)',  icon:'ti-cpu'       },
  multimedia: { color:'#ff2d9b',    bg:'rgba(255,45,155,.1)', icon:'ti-palette'   },
  robotica:   { color:'var(--oro)', bg:'rgba(255,210,63,.1)', icon:'ti-robot'     }
};

// --- Leer params ---
const params = new URLSearchParams(location.search);
const MATERIA_ID = params.get('m') || 'tecnologia';
const matData = MATERIAS.find(m=>m.id===MATERIA_ID) || MATERIAS[1];
const pal = PALETA[MATERIA_ID] || PALETA.tecnologia;
const grupos = MATERIA_GRUPOS[MATERIA_ID] || [];

// --- Sesión del estudiante ---
let EST = null;
try{ EST = JSON.parse(sessionStorage.getItem('ifn_est')); }catch(e){}
if(!EST){ location.href='index.html'; }

// --- Trimestre actual: por defecto T2, se recuerda la última selección del estudiante ---
let TRIM_ACTUAL = parseInt(localStorage.getItem('ifn_trim')) || 2;
window.setTrim = (t, btn) => {
  TRIM_ACTUAL = t;
  localStorage.setItem('ifn_trim', t);
  document.querySelectorAll('.trim-tab').forEach(b=>b.classList.remove('on'));
  btn?.classList.add('on');
  cargarMateriales();
  cargarActividades();
};
document.getElementById('ttrim'+TRIM_ACTUAL).classList.add('on');

// --- Pintar hero ---
$('mIco').style.background = pal.bg;
$('mIco').style.color = pal.color;
$('mIco').innerHTML = `<i class="ti ${pal.icon}"></i>`;
$('mNom').textContent = matData.n;
$('mSub').textContent = matData.d;
$('mGrados').style.background = pal.bg;
$('mGrados').style.color = pal.color;
$('mGrados').style.border = `1px solid ${pal.color}`;
$('mGrados').innerHTML = `<i class="ti ti-users"></i> ${grupos.join(' · ')}`;
document.title = matData.n + ' — Aula IFN';

// --- Pintar quién eres ---
$('whAv').textContent = (EST.nombre[0]||'?').toUpperCase();
if(EST.demo) $('whAv').classList.add('demo');
$('whNom').textContent = EST.nombre;
$('whGrado').textContent = EST.demo ? 'Modo demostración' : 'Grado ' + EST.grado;

// --- Cargar materiales ---
let MATERIALES_CON_FECHA = []; // para actualizar el reloj cada minuto

async function cargarMateriales(){
  $('listaMat').innerHTML = '<div class="loading"><span class="spin"></span> Cargando materiales…</div>';
  try{
    const snap = await getDoc(doc(db,'materiales',MATERIA_ID));
    const items = (snap.exists() ? (snap.data().items || []) : [])
      .filter(i=>i.activo && (i.trimestre||1)===TRIM_ACTUAL);
    if(!items.length){
      $('listaMat').innerHTML = `<div class="empty">No hay materiales publicados para el Trimestre ${TRIM_ACTUAL}.</div>`;
      return;
    }
    MATERIALES_CON_FECHA = [];
    $('listaMat').innerHTML = items.map((i,idx)=>{
      let fechaHtml='';
      if(i.fechaEvento){
        // El "límite" real es las 7:00am del día del evento
        const limite = new Date(i.fechaEvento+'T07:00:00');
        const fStr = limite.toLocaleDateString('es-PA',{day:'numeric',month:'long',year:'numeric'});
        const id = 'cd_'+idx;
        MATERIALES_CON_FECHA.push({id, limite});
        fechaHtml = `<div style="margin-top:6px;">
          <span class="mat-fecha"><i class="ti ti-calendar-event"></i> ${fStr} · 7:00 a.m.</span>
        </div>
        <div id="${id}"></div>`;
      }
      return `<div class="mat-card">
        <div class="mat-ico"><i class="ti ti-file-description"></i></div>
        <div class="mat-body">
          <b>${i.titulo}</b>
          ${i.descripcion?`<p>${i.descripcion}</p>`:''}
          ${fechaHtml}
          ${i.url?`<a class="mat-dl" href="${i.url}" target="_blank"><i class="ti ti-download"></i> Descargar material</a>`:''}
        </div>
      </div>`;
    }).join('');
    actualizarRelojes();
  }catch(e){
    $('listaMat').innerHTML = '<div class="empty">Error al cargar materiales.</div>';
  }
}

function actualizarRelojes(){
  const ahora = new Date();
  MATERIALES_CON_FECHA.forEach(({id,limite})=>{
    const el = $(id); if(!el) return;
    const ms = limite - ahora;

    if(ms <= 0){
      el.innerHTML = `<div class="cd-finalizado"><i class="ti ti-clock-pause"></i> Esta actividad ya está en curso o finalizó.</div>`;
      return;
    }
    const dias = Math.floor(ms/(1000*60*60*24));
    const horas = Math.floor((ms/(1000*60*60))%24);
    const mins = Math.floor((ms/(1000*60))%60);
    const urgente = dias<=5 ? 'urgente' : '';
    el.innerHTML = `<div class="cd-box ${urgente}">
      <div class="cd-label"><i class="ti ti-alarm"></i> Cuenta regresiva</div>
      <div class="cd-clock">
        <div class="cd-unit"><b>${dias}</b><span>Días</span></div>
        <div class="cd-unit"><b>${horas}</b><span>Horas</span></div>
        <div class="cd-unit"><b>${mins}</b><span>Min</span></div>
      </div>
    </div>`;
  });
}

setInterval(actualizarRelojes, 60000); // refresca cada minuto

// --- Cargar actividades ---
async function cargarActividades(){
  const candidatas = CATALOGO_ACTIVIDADES.filter(a=>
    a.materia===MATERIA_ID &&
    (a.grupos.length===0 || !EST.demo || a.grupos.includes(EST.grado))
  );
  if(!candidatas.length){
    $('listaAct').innerHTML = `<div class="empty">Aún no hay actividades publicadas en esta materia.</div>`;
    return;
  }
  // Resolver trimestre real (Firebase puede tener el trimestre movido por el docente)
  const acts = [];
  const configsPorAct = {};
  for(const a of candidatas){
    let cfg = {};
    try{
      const s = await getDoc(doc(db,'actividades',a.id));
      if(s.exists()) cfg = s.data();
    }catch(e){}
    configsPorAct[a.id] = cfg;
    const trimReal = cfg.trimestre || a.trimestre || 1;
    if(trimReal === TRIM_ACTUAL) acts.push(a);
  }
  if(!acts.length){
    $('listaAct').innerHTML = `<div class="empty">Aún no hay actividades publicadas en el Trimestre ${TRIM_ACTUAL} para esta materia.</div>`;
    return;
  }
  let html='';
  for(const a of acts){
    const d = configsPorAct[a.id] || {};
    // Config de apertura/cierre de este grupo específico
    let abierta=true;
    const gKey = EST.grado? 'g_'+EST.grado.replace(/[°\s]/g,'') : null;
    const configGrupo = (gKey && d[gKey]) ? d[gKey] : {};
    abierta = configGrupo.abierta !== undefined ? configGrupo.abierta : (d.abierta !== false);
    const now=new Date();
    if(configGrupo.apertura && new Date(configGrupo.apertura)>now) abierta=false;
    if(configGrupo.cierre && new Date(configGrupo.cierre)<now) abierta=false;
    // Nota existente del estudiante
    let notaHtml='<span class="ac-nota pend">Pendiente</span>';
    if(!EST.demo){
      try{
        const r=await getDoc(doc(db,'actividades',a.id,'resultados',EST.codigo));
        if(r.exists()){
          const n=r.data().nota;
          const cls=n>=3.0?'ap':'re';
          notaHtml=`<span class="ac-nota ${cls}">Nota ${n.toFixed(1)}</span>`;
        }
      }catch(e){}
    }
    const estBadge=abierta
      ? '<span class="ac-est abierta"><i class="ti ti-circle-check"></i> Abierta</span>'
      : '<span class="ac-est cerrada"><i class="ti ti-lock"></i> Cerrada</span>';
    const cls=!abierta?'bloqueada':'';
    html+=`<a class="act-card ${cls}" href="${a.url}">
      <div class="ac-ico"><i class="ti ${a.icon}"></i></div>
      <div class="ac-body"><b>${a.nombre}</b><span>${a.sub}</span></div>
      ${estBadge}${notaHtml}
      <i class="ti ti-chevron-right ago"></i>
    </a>`;
  }
  $('listaAct').innerHTML = html;
}

cargarMateriales();
cargarActividades();
</script>
</body></html>
