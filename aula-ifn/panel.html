<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel Docente — Aula IFN</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<style>
:root{--bg:#05060a;--panel:#0b0f1a;--panel2:#10141f;--linea:rgba(0,240,255,.14);--linea2:rgba(0,240,255,.3);--tx:#e9f6ff;--tx2:#8aa0b8;--tx3:#52647a;--neon:#00f0ff;--ok:#00ffa3;--err:#ff4d6d;--oro:#ffd23f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:var(--tx);background:var(--bg);line-height:1.6;overflow-x:hidden;min-height:100vh;}
h1,h2,h3,.d{font-family:'Chakra Petch',sans-serif;}
body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 20% 0%,rgba(0,240,255,.1),transparent 38%),radial-gradient(circle at 90% 12%,rgba(255,45,155,.08),transparent 40%);pointer-events:none;}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px 20px 60px;}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.br{display:flex;align-items:center;gap:12px;}.br img{height:42px;width:42px;object-fit:contain;border-radius:9px;background:#fff;padding:3px;}
.br b{font-family:'Chakra Petch';font-weight:700;font-size:14px;color:#fff;display:block;line-height:1.1;}.br span{font-size:10px;color:var(--neon);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.back{font-size:13px;color:var(--tx2);text-decoration:none;padding:8px 14px;border:1px solid var(--linea2);border-radius:7px;display:flex;align-items:center;gap:6px;cursor:pointer;}.back:hover{color:var(--neon);}
.box{background:var(--panel);border:1px solid var(--linea2);border-radius:12px;padding:28px 26px;position:relative;overflow:hidden;box-shadow:0 0 50px -22px rgba(0,240,255,.3);}
.box::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--neon);box-shadow:0 0 12px var(--neon);}
.ico-big{width:70px;height:70px;border-radius:18px;background:rgba(255,210,63,.1);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--oro);margin:0 auto 18px;}
.box h1{font-family:'Chakra Petch';font-size:26px;color:#fff;text-align:center;margin-bottom:6px;}
.box .sub{text-align:center;color:var(--tx2);font-size:14px;margin-bottom:24px;}
.fl{max-width:360px;margin:0 auto;}
.fl label{display:block;font-family:'Chakra Petch';font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.fl input{width:100%;padding:14px 16px;font-family:'Chakra Petch';font-size:16px;font-weight:600;letter-spacing:3px;border:1.5px solid var(--linea2);border-radius:8px;color:var(--neon);background:var(--bg);text-align:center;}
.fl input:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 4px rgba(0,240,255,.12);}
.be{width:100%;margin-top:14px;padding:15px;font-family:'Chakra Petch';font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--bg);background:var(--neon);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:.18s;box-shadow:0 0 24px -6px var(--neon);}
.be:hover{transform:translateY(-1px);}.be:disabled{opacity:.5;cursor:not-allowed;}
.be.sec{background:transparent;border:1px solid var(--linea2);color:var(--tx2);box-shadow:none;}.be.sec:hover{color:var(--neon);border-color:var(--neon);}
.be.sm{width:auto;margin:0;padding:9px 16px;font-size:13px;}
.msg{font-size:13px;font-weight:500;padding:11px 14px;border-radius:8px;margin-top:14px;text-align:center;display:none;}
.msg.err{display:block;background:rgba(255,77,109,.12);color:#ffb3c0;border:1px solid rgba(255,77,109,.3);}
.msg.ok{display:block;background:rgba(0,255,163,.12);color:#7dffce;border:1px solid rgba(0,255,163,.3);}
.msg.warn{display:block;background:rgba(255,210,63,.12);color:#ffe79a;border:1px solid rgba(255,210,63,.3);}
.linkrow{text-align:center;margin-top:18px;}.linkrow a{font-size:12px;color:var(--tx3);text-decoration:none;cursor:pointer;}.linkrow a:hover{color:var(--neon);}
.hide{display:none!important;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--linea2);border-top-color:var(--neon);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;}@keyframes sp{to{transform:rotate(360deg);}}
/* panel */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tab{font-family:'Chakra Petch';font-size:13px;padding:9px 16px;border-radius:8px;border:1px solid var(--linea2);background:var(--panel2);color:var(--tx2);cursor:pointer;transition:.15s;}
.tab.on{background:var(--neon);color:var(--bg);border-color:var(--neon);}.tab:not(.on):hover{color:var(--neon);}
/* lista de actividades */
.actcard{background:var(--panel2);border:1px solid var(--linea);border-radius:12px;padding:20px;margin-bottom:16px;}
.actcard .ahead{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.actcard .ai{width:48px;height:48px;border-radius:12px;background:rgba(0,240,255,.1);color:var(--neon);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.actcard .at{flex:1;min-width:160px;}.actcard .at b{font-family:'Chakra Petch';font-size:16px;color:#fff;display:block;}.actcard .at span{font-size:12px;color:var(--tx2);}
.estado{font-family:'Chakra Petch';font-size:10px;padding:4px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.estado.abierta{background:rgba(0,255,163,.15);color:var(--ok);border:1px solid rgba(0,255,163,.3);}
.estado.cerrada{background:rgba(255,77,109,.15);color:var(--err);border:1px solid rgba(255,77,109,.3);}
.ctrls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding-top:16px;border-top:1px solid var(--linea);}
.ctrl{}.ctrl label{display:block;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.ctrl input,.ctrl select{width:100%;padding:9px 11px;font-size:13px;border:1px solid var(--linea2);border-radius:8px;background:var(--bg);color:var(--tx);font-family:'Inter';}
.ctrl input:focus,.ctrl select:focus{outline:none;border-color:var(--neon);}
.ctrl.full{grid-column:1/-1;display:flex;align-items:center;gap:10px;justify-content:flex-end;flex-wrap:wrap;}
.tg{width:52px;height:28px;border-radius:100px;background:var(--bg);border:1px solid var(--linea2);cursor:pointer;position:relative;transition:.2s;flex-shrink:0;}
.tg::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--tx3);transition:.2s;}
.tg.on{background:rgba(0,255,163,.2);border-color:var(--ok);}.tg.on::after{left:26px;background:var(--ok);box-shadow:0 0 10px var(--ok);}
.tgwrap{display:flex;align-items:center;gap:10px;}.tgwrap b{font-family:'Chakra Petch';font-size:13px;color:#fff;}
/* stats + tabla */
.dstat{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.ds{flex:1;min-width:100px;background:var(--panel2);border:1px solid var(--linea);border-radius:10px;padding:14px;text-align:center;}
.ds b{font-family:'Chakra Petch';font-size:24px;color:var(--neon);display:block;line-height:1;}.ds span{font-size:11px;color:var(--tx2);}
.ds.ap b{color:var(--ok);}.ds.re b{color:var(--err);}
.dtools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.dtools select,.dtools button{font-family:'Inter';font-size:13px;padding:9px 14px;border-radius:8px;border:1px solid var(--linea2);background:var(--panel2);color:var(--tx);cursor:pointer;}
.dtools button:hover{border-color:var(--neon);color:var(--neon);}
.dtools .sp{flex:1;}
.tbl-wrap{max-height:420px;overflow:auto;border:1px solid var(--linea);border-radius:10px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-family:'Chakra Petch';font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);text-align:left;padding:10px 12px;border-bottom:1px solid var(--linea2);position:sticky;top:0;background:var(--panel);}
td{padding:10px 12px;border-bottom:1px solid var(--linea);color:var(--tx);}
tr:hover td{background:rgba(0,240,255,.04);}
.tnota{font-family:'Chakra Petch';font-weight:700;}.tnota.ap{color:var(--ok);}.tnota.re{color:var(--err);}
.selact{margin-bottom:16px;}
.selact label{display:block;font-family:'Chakra Petch';font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.selact select{width:100%;max-width:400px;padding:11px 14px;font-size:14px;border:1px solid var(--linea2);border-radius:8px;background:var(--panel2);color:var(--tx);}
@media(max-width:560px){.box{padding:22px 16px;}.ds{min-width:80px;}}
</style></head><body><div class="wrap">

<div class="top">
  <div class="br"><img src="logo.png"><div><b>Instituto Fermín Naudeau</b><span>Aula Virtual · Panel Docente</span></div></div>
  <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> Volver al aula</a>
</div>

<!-- LOGIN -->
<div class="box" id="scrLogin">
  <div class="ico-big"><i class="ti ti-shield-lock"></i></div>
  <h1>Panel Académico</h1>
  <p class="sub">Control de actividades del aula virtual. Acceso restringido.</p>
  <div class="fl">
    <label>Clave de profesor</label>
    <input id="inPass" type="password" placeholder="••••••">
    <button class="be" id="btnLogin" onclick="entrar()"><i class="ti ti-login-2"></i> Entrar</button>
    <div class="msg" id="msgLogin"></div>
  </div>
</div>

<!-- PANEL -->
<div class="box hide" id="scrPanel">
  <div class="top" style="margin-bottom:18px">
    <h1 style="font-size:22px;text-align:left">Panel Académico</h1>
    <a class="back" onclick="salir()"><i class="ti ti-logout"></i> Salir</a>
  </div>

  <div class="tabs">
    <button class="tab on" id="tabCtrl" onclick="verTab('ctrl')"><i class="ti ti-settings"></i> Control de actividades</button>
    <button class="tab" id="tabRes" onclick="verTab('res')"><i class="ti ti-chart-bar"></i> Resultados y notas</button>
  </div>

  <!-- TAB CONTROL -->
  <div id="panCtrl">
    <div id="listaActs"></div>
    <div class="msg" id="msgCtrl"></div>
  </div>

  <!-- TAB RESULTADOS -->
  <div id="panRes" class="hide">
    <div class="selact">
      <label>Actividad</label>
      <select id="selAct" onchange="cargarResultados()"></select>
    </div>
    <div class="dstat">
      <div class="ds"><b id="dsTot">0</b><span>Entregas</span></div>
      <div class="ds ap"><b id="dsAp">0</b><span>Aprobados</span></div>
      <div class="ds re"><b id="dsRe">0</b><span>Reprobados</span></div>
      <div class="ds"><b id="dsProm">—</b><span>Promedio</span></div>
    </div>
    <div class="dtools">
      <select id="filGrado" onchange="renderTabla()"><option value="">Todos los grados</option></select>
      <button onclick="cargarResultados()"><i class="ti ti-refresh"></i> Actualizar</button>
      <div class="sp"></div>
      <button onclick="exportarCSV()"><i class="ti ti-file-spreadsheet"></i> Exportar Excel</button>
    </div>
    <div class="tbl-wrap">
      <table><thead><tr><th>#</th><th>Estudiante</th><th>Grado</th><th>Puntaje</th><th>Nota</th><th>Intentos</th><th>Fecha</th></tr></thead><tbody id="tbRes"></tbody></table>
    </div>
    <div class="msg" id="msgRes"></div>
  </div>
</div>

</div>

<script src="config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);
function show(s){ ['scrLogin','scrPanel'].forEach(x=>$(x).classList.add('hide')); $(s).classList.remove('hide'); window.scrollTo(0,0); }

let CONFIG_ACTS = {};   // id -> {abierta,intentos,apertura,cierre}
let RESULTADOS = [];

// ---------- LOGIN ----------
window.entrar = async () => {
  const p = $('inPass').value, m = $('msgLogin');
  if(!p){ m.className='msg err'; m.textContent='Escribe la clave.'; return; }
  m.className='msg warn'; m.innerHTML='<span class="spin"></span> Verificando…'; $('btnLogin').disabled=true;
  try{
    const s = await getDoc(doc(db,'config','admin'));
    const real = s.exists()? s.data().password : null;
    $('btnLogin').disabled=false;
    if(real && p === real){ m.className='msg'; m.textContent=''; abrirPanel(); }
    else { m.className='msg err'; m.textContent='Clave incorrecta.'; }
  }catch(e){ $('btnLogin').disabled=false; m.className='msg err'; m.textContent='Error de conexión.'; }
};
window.salir = () => { $('inPass').value=''; show('scrLogin'); };

async function abrirPanel(){
  show('scrPanel');
  await cargarConfigActs();
  renderControl();
  // llenar selector de actividades en tab resultados
  $('selAct').innerHTML = CATALOGO_ACTIVIDADES.map(a=>`<option value="${a.id}">${a.nombre}</option>`).join('');
}

// ---------- CONFIG DE ACTIVIDADES ----------
async function cargarConfigActs(){
  CONFIG_ACTS = {};
  for(const a of CATALOGO_ACTIVIDADES){
    try{
      const s = await getDoc(doc(db,'actividades',a.id));
      CONFIG_ACTS[a.id] = s.exists()? s.data() : {};
    }catch(e){ CONFIG_ACTS[a.id] = {}; }
  }
}

window.verTab = (t) => {
  $('tabCtrl').classList.toggle('on', t==='ctrl');
  $('tabRes').classList.toggle('on', t==='res');
  $('panCtrl').classList.toggle('hide', t!=='ctrl');
  $('panRes').classList.toggle('hide', t!=='res');
  if(t==='res' && !RESULTADOS.length) cargarResultados();
};

function renderControl(){
  $('listaActs').innerHTML = CATALOGO_ACTIVIDADES.map(a=>{
    const c = CONFIG_ACTS[a.id] || {};
    const abierta = c.abierta !== false; // por defecto abierta
    const intentos = c.intentos || 1;
    const apertura = c.apertura || '';
    const cierre = c.cierre || '';
    return `<div class="actcard">
      <div class="ahead">
        <div class="ai"><i class="ti ${a.icon}"></i></div>
        <div class="at"><b>${a.nombre}</b><span>${a.sub}</span></div>
        <span class="estado ${abierta?'abierta':'cerrada'}" id="est_${a.id}">${abierta?'● Abierta':'● Cerrada'}</span>
      </div>
      <div class="ctrls">
        <div class="ctrl"><label>Intentos permitidos</label>
          <input type="number" min="1" max="20" id="int_${a.id}" value="${intentos}"></div>
        <div class="ctrl"><label>Apertura (opcional)</label>
          <input type="datetime-local" id="ap_${a.id}" value="${apertura}"></div>
        <div class="ctrl"><label>Cierre (opcional)</label>
          <input type="datetime-local" id="ci_${a.id}" value="${cierre}"></div>
        <div class="ctrl full">
          <div class="tgwrap"><b>Abierta manualmente</b>
            <div class="tg ${abierta?'on':''}" id="tg_${a.id}" onclick="toggle('${a.id}')"></div></div>
          <button class="be sm" onclick="guardar('${a.id}')"><i class="ti ti-device-floppy"></i> Guardar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.toggle = (id) => {
  const c = CONFIG_ACTS[id] || {}; c.abierta = (c.abierta===false)? true : false;
  CONFIG_ACTS[id] = c;
  $('tg_'+id).classList.toggle('on', c.abierta!==false);
  const e=$('est_'+id); const ab=c.abierta!==false;
  e.className='estado '+(ab?'abierta':'cerrada'); e.textContent=ab?'● Abierta':'● Cerrada';
};

window.guardar = async (id) => {
  const a = CATALOGO_ACTIVIDADES.find(x=>x.id===id);
  const c = CONFIG_ACTS[id] || {};
  const data = {
    nombre: a.nombre,
    abierta: c.abierta !== false,
    intentos: parseInt($('int_'+id).value) || 1,
    apertura: $('ap_'+id).value || '',
    cierre: $('ci_'+id).value || ''
  };
  const m = $('msgCtrl');
  m.className='msg warn'; m.innerHTML='<span class="spin"></span> Guardando…';
  try{
    await setDoc(doc(db,'actividades',id), data, {merge:true});
    CONFIG_ACTS[id] = {...c, ...data};
    m.className='msg ok'; m.textContent='✓ Configuración de "'+a.nombre+'" guardada.';
  }catch(e){ m.className='msg err'; m.textContent='Error al guardar: '+e.message; }
};

// ---------- RESULTADOS ----------
window.cargarResultados = async () => {
  const actId = $('selAct').value;
  if(!actId) return;
  const m = $('msgRes');
  m.className='msg warn'; m.innerHTML='<span class="spin"></span> Cargando…';
  try{
    const snap = await getDocs(collection(db,'actividades',actId,'resultados'));
    RESULTADOS = []; snap.forEach(d=>RESULTADOS.push(d.data()));
    RESULTADOS.sort((a,b)=>(a.grado||'').localeCompare(b.grado||'')||(a.nombre||'').localeCompare(b.nombre||''));
    const grados=[...new Set(RESULTADOS.map(r=>r.grado))].sort();
    const sel=$('filGrado'); const cur=sel.value;
    sel.innerHTML='<option value="">Todos los grados</option>'+grados.map(g=>`<option value="${g}">${g}</option>`).join('');
    sel.value=cur;
    m.className='msg'; m.textContent='';
    renderTabla();
  }catch(e){ m.className='msg err'; m.textContent='Error al cargar: '+e.message; }
};

window.renderTabla = () => {
  const fil=$('filGrado').value;
  const rows=RESULTADOS.filter(r=>!fil||r.grado===fil);
  const notas=rows.map(r=>r.nota).filter(n=>typeof n==='number');
  $('dsTot').textContent=rows.length;
  $('dsAp').textContent=notas.filter(n=>n>=3.0).length;
  $('dsRe').textContent=notas.filter(n=>n<3.0).length;
  $('dsProm').textContent=notas.length?(notas.reduce((s,n)=>s+n,0)/notas.length).toFixed(1):'—';
  $('tbRes').innerHTML=rows.length?rows.map((r,i)=>{
    const f=r.fecha?new Date(r.fecha).toLocaleDateString('es-PA',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—';
    const cls=r.nota>=3.0?'ap':'re';
    return `<tr><td>${i+1}</td><td>${r.nombre}</td><td>${r.grado}</td><td>${r.puntaje}</td><td class="tnota ${cls}">${r.nota.toFixed(1)}</td><td>${r.intentos||1}</td><td>${f}</td></tr>`;
  }).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--tx3);padding:30px">Aún no hay entregas.</td></tr>';
};

window.exportarCSV = () => {
  const fil=$('filGrado').value;
  const actId=$('selAct').value;
  const actNom=CATALOGO_ACTIVIDADES.find(a=>a.id===actId)?.nombre||actId;
  const rows=RESULTADOS.filter(r=>!fil||r.grado===fil);
  if(!rows.length){ $('msgRes').className='msg warn'; $('msgRes').textContent='No hay datos para exportar.'; return; }
  let csv='\uFEFF#,Código,Estudiante,Grado,Correctas,Incorrectas,Puntaje,Nota,Intentos,Fecha\n';
  rows.forEach((r,i)=>{
    const f=r.fecha?new Date(r.fecha).toLocaleString('es-PA'):'';
    csv+=`${i+1},"${r.codigo}","${r.nombre}","${r.grado}",${r.correctas},${r.incorrectas},"${r.puntaje}",${r.nota.toFixed(1)},${r.intentos||1},"${f}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`${actNom.replace(/ /g,'_')}_${fil||'todos'}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  $('msgRes').className='msg ok'; $('msgRes').textContent='✓ Archivo exportado.';
};

$('inPass').addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });
</script>
</body></html>
